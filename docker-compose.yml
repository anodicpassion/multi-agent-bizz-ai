version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-agent-bizz-ai
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - chroma_data:/app/data/chromadb
      - uploads:/app/data/uploads
    env_file:
      - .env
    environment:
      - CHROMA_PERSIST_DIR=/app/data/chromadb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  chroma_data:
    driver: local
  uploads:
    driver: local
